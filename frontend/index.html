<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCP Server Frontend</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 24px;
  }

  h1 {
    margin-bottom: 8px;
  }

  textarea,
  select,
  button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    box-sizing: border-box;
  }

  textarea {
    min-height: 180px;
    font-family: monospace;
  }

  pre {
    background: #f4f4f4;
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 6px;
  }

  .row {
    display: grid;
    gap: 12px;
  }

  .notes {
    color: #555;
    font-size: 0.9rem;
    margin-bottom: 16px;
  }

  button {
    cursor: pointer;
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.6;
  }
</style>
</head>

<body>

<h1>MCP Server Frontend</h1>

<div class="notes">
  Select a tool, enter your input, then click Run (Ctrl + Enter also works).
</div>

<div class="row">

  <label>Tool</label>
  <select id="toolSelect" disabled></select>

  <label>Input</label>
  <textarea id="userInput">import os
print("hello")</textarea>

  <button id="runBtn">Run Tool</button>

  <label>Result</label>
  <pre id="output">Loading tools...</pre>

</div>
<script>

const apiBase = "http://afe814ffad6744f97a5019d6cff70ce4-2031942274.us-east-1.elb.amazonaws.com:8000";
// If your ALB has HTTPS enabled, use:
// const apiBase = "https://afe814ffad6744f97a5019d6cff70ce4-2031942274.us-east-1.elb.amazonaws.com";

const toolSelect = document.getElementById("toolSelect");
const userInput = document.getElementById("userInput");
const output = document.getElementById("output");
const runBtn = document.getElementById("runBtn");

let retryTimer = null;

// Disable controls until tools are loaded
toolSelect.disabled = true;
runBtn.disabled = true;

// Load available tools
async function loadTools() {

    output.textContent = "Loading tools...";

    try {

        const response = await fetch(`${apiBase}/tools`);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const contentType = response.headers.get("content-type") || "";

        let data;

        if (contentType.includes("application/json")) {
            data = await response.json();
        } else {
            throw new Error("Server did not return JSON.");
        }

        const tools = Array.isArray(data)
            ? data
            : (data.tools || []);

        toolSelect.innerHTML = "";

        if (tools.length === 0) {
            output.textContent = "No tools available.";
            return;
        }

        tools.forEach(tool => {

            const option = document.createElement("option");

            option.value = tool.name;
            option.textContent = `${tool.name} - ${tool.description}`;

            toolSelect.appendChild(option);

        });

        toolSelect.disabled = false;
        runBtn.disabled = false;

        clearTimeout(retryTimer);

        output.textContent = ":white_check_mark: Tools loaded successfully.";

    }

    catch (err) {

        output.textContent =
            ":x: Unable to load tools.\n\n" +
            err.message +
            "\n\nRetrying in 3 seconds...";

        clearTimeout(retryTimer);

        retryTimer = setTimeout(loadTools, 3000);

    }

}

// Run selected tool
async function runTool() {

    if (!toolSelect.value) {
        output.textContent = "Please select a tool.";
        return;
    }

    if (!userInput.value.trim()) {
        output.textContent = "Please enter input.";
        return;
    }

    runBtn.disabled = true;

    output.textContent = "Running...";

    try {

        const payload = {

            tool: toolSelect.value,
            input: userInput.value

        };

        const response = await fetch(`${apiBase}/invoke`, {

            method: "POST",

            headers: {

                "Content-Type": "application/json",
                "Accept": "application/json"

            },

            body: JSON.stringify(payload)

        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const contentType = response.headers.get("content-type") || "";

        let result;

        if (contentType.includes("application/json")) {
            result = await response.json();
            output.textContent = JSON.stringify(result, null, 2);
        } else {
            result = await response.text();
            output.textContent = result;
        }

    }

    catch (err) {

        output.textContent =
            ":x: Invocation Error\n\n" +
            err.message;

    }

    finally {

        runBtn.disabled = false;

    }

}

runBtn.addEventListener("click", runTool);

// Ctrl + Enter shortcut
userInput.addEventListener("keydown", function(e) {

    if (e.ctrlKey && e.key === "Enter") {
        e.preventDefault();
        runTool();
    }

});

// Load tools on startup
loadTools();

</script>
